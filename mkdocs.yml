site_name: cardano-multisig
site_url: https://lambdasistemi.github.io/cardano-multisig/
repo_url: https://github.com/lambdasistemi/cardano-multisig

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.indexes
    - content.code.copy
    - navigation.path

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - footnotes
  - def_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Devnet runbook: devnet-run.md
  - Architecture:
      - architecture/index.md
      - Trust model: architecture/trust-model.md
      - Fees & economics: architecture/fees.md
      - Fee discovery: architecture/fee-discovery.md
      - Request lifecycle: architecture/lifecycle.md
      - Components: architecture/components.md
  - API (/v1): api-v1.md
