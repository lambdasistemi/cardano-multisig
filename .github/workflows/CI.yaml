name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build executable
        run: nix --quiet build .#cardano-multisig
      - name: Build docker image
        run: nix --quiet build .#docker-image -o cardano-multisig-image
      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: cardano-multisig-image
          path: cardano-multisig-image

  unit:
    name: Unit tests
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run unit tests
        run: nix --quiet run .#unit-tests

  dev-shell:
    name: Dev shell build gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build in dev shell
        run: nix --quiet develop -c just cabal-check

  formatting:
    name: Formatting
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check formatting
        run: nix --quiet develop -c just format-check

  hlint:
    name: HLint
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix --quiet develop -c just hlint

  # Note: the `nixos` runners have no docker daemon, so the image is not
  # pushed from CI. The `Build` job publishes the nix-built image as a
  # downloadable artifact; deployment ships that image to the host
  # directly (see CD/). Registry publishing, if wanted, must use skopeo.
