name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build executable
        run: nix --quiet build .#cardano-multisig
      - name: Build docker image
        run: nix --quiet build .#docker-image -o cardano-multisig-image
      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: cardano-multisig-image
          path: cardano-multisig-image

  unit:
    name: Unit tests
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run unit tests
        run: nix --quiet run .#unit-tests

  dev-shell:
    name: Dev shell build gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build in dev shell
        run: nix --quiet develop --accept-flake-config -c cabal build all -O0

  formatting:
    name: Formatting
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check formatting
        run: nix --quiet develop -c just format-check

  hlint:
    name: HLint
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix --quiet develop -c just hlint

  publish-image:
    name: Publish image
    if: github.event_name == 'push'
    needs: [build, unit, dev-shell, formatting, hlint]
    runs-on: nixos
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build and load image
        run: |
          nix --quiet build .#docker-image -o cardano-multisig-image
          docker load < cardano-multisig-image
      - name: Push commit-hash-tagged image to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          VERSION=$(nix --quiet eval --raw .#version)
          IMAGE=ghcr.io/lambdasistemi/cardano-multisig
          docker tag "${IMAGE}:${VERSION}" "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${GITHUB_SHA}"
